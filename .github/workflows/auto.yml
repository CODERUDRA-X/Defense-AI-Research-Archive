name: Daily Defense-AI Research Fetcher

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python fetch_papers.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CODERUDRA-X AutoBot"
          git add README.md
          git commit -m "Add daily AI research paper" || echo "No changes to commit"
          git push
