name: Daily Defense-AI Research Fetcher

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      # Fetch papers via script
      - name: Run Fetcher Script
        run: python fetch_papers.py
        
      # Commit changes to README and SVG
      - name: Commit and Push
        run: |
          git config --global user.name "CODERUDRA-X"
          git config --global user.email "harshgroups247@gmail.com"
          git add -A
          git commit -m "Automated Defense-AI Research & Sacred Protocol Update" || exit 0
          git push
